version: '3.8'
services:
  react-app-staging:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=staging
      - REACT_APP_API_URL=https://staging-api.your-domain.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.react-staging.rule=Host(`staging.your-domain.com`)"
      - "traefik.http.routers.react-staging.tls=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
